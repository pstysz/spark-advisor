analyzer:
  image:
    repository: spark-advisor-analyzer
    tag: ""
    pullPolicy: Never
  config:
    logLevel: "DEBUG"
  anthropicApiKey:
    existingSecret: anthropic-api-key

gateway:
  image:
    repository: spark-advisor-gateway
    tag: ""
    pullPolicy: Never
  config:
    logLevel: "DEBUG"

frontend:
  image:
    repository: spark-advisor-frontend
    tag: ""
    pullPolicy: Never
  service:
    type: NodePort
    port: 80
    nodePort: 30081

hs-connector:
  image:
    repository: spark-advisor-hs-connector
    tag: ""
    pullPolicy: Never
  config:
    logLevel: "DEBUG"
    historyServerUrl: "http://host.minikube.internal:18080"

storage-connector:
  enabled: true
  image:
    repository: spark-advisor-storage-connector
    tag: ""
    pullPolicy: Never
  config:
    logLevel: "DEBUG"
    connectorType: "hdfs"
    hdfs:
      namenodeUrl: "http://host.minikube.internal:9870"
