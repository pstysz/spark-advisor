apiVersion: v2
name: spark-advisor
description: Spark Advisor — AI-powered Spark job performance analyzer (umbrella chart)
type: application
version: 0.1.14 # x-release-please-version
appVersion: "0.1.14" # x-release-please-version

dependencies:
  - name: spark-advisor-analyzer
    version: "0.1.14" # x-release-please-version
    repository: "file://../analyzer"
    alias: analyzer
  - name: spark-advisor-gateway
    version: "0.1.14" # x-release-please-version
    repository: "file://../gateway"
    alias: gateway
  - name: spark-advisor-frontend
    version: "0.1.14" # x-release-please-version
    repository: "file://../frontend"
    alias: frontend
  - name: spark-advisor-hs-connector
    version: "0.1.14" # x-release-please-version
    repository: "file://../hs-connector"
    alias: hs-connector
  - name: nats
    version: "1.2.6"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
  - name: spark-advisor-prometheus
    version: "0.1.14" # x-release-please-version
    repository: "file://../prometheus"
    alias: prometheus
    condition: prometheus.enabled
  - name: spark-advisor-tempo
    version: "0.1.14" # x-release-please-version
    repository: "file://../tempo"
    alias: tempo
    condition: tempo.enabled
  - name: spark-advisor-grafana
    version: "0.1.14" # x-release-please-version
    repository: "file://../grafana"
    alias: grafana
    condition: grafana.enabled
