analyzer:
  image:
    repository: spark-advisor-analyzer
    tag: ""
    pullPolicy: Never
  config:
    logLevel: "DEBUG"
  anthropicApiKey:
    existingSecret: anthropic-api-key

gateway:
  image:
    repository: spark-advisor-gateway
    tag: ""
    pullPolicy: Never
  config:
    logLevel: "DEBUG"
  service:
    type: NodePort
    port: 8080
    nodePort: 30080

hs-connector:
  image:
    repository: spark-advisor-hs-connector
    tag: ""
    pullPolicy: Never
  config:
    logLevel: "DEBUG"
    historyServerUrl: "http://host.minikube.internal:18080"
