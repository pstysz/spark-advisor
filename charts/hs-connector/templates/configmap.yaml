apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hs-connector.fullname" . }}
  labels:
    {{- include "hs-connector.labels" . | nindent 4 }}
data:
  SA_CONNECTOR_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  SA_CONNECTOR_NATS__URL: {{ .Values.config.nats.url | quote }}
  SA_CONNECTOR_NATS__ANALYSIS_SUBMIT_SUBJECT: {{ .Values.config.nats.analysisSubmitSubject | quote }}
  SA_CONNECTOR_NATS__JOB_FETCH_SUBJECT: {{ .Values.config.nats.jobFetchSubject | quote }}
  SA_CONNECTOR_HISTORY_SERVER_URL: {{ .Values.config.historyServerUrl | quote }}
  SA_CONNECTOR_HISTORY_SERVER_TIMEOUT: {{ .Values.config.historyServerTimeout | quote }}
  SA_CONNECTOR_POLL_INTERVAL_SECONDS: {{ .Values.config.pollIntervalSeconds | quote }}
  SA_CONNECTOR_BATCH_SIZE: {{ .Values.config.batchSize | quote }}
  SA_CONNECTOR_MAX_PROCESSED_APPS: {{ .Values.config.maxProcessedApps | quote }}
  SA_CONNECTOR_DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
