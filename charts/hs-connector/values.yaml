replicaCount: 1

image:
  repository: ghcr.io/pstysz/spark-advisor-hs-connector
  tag: ""
  pullPolicy: IfNotPresent

config:
  logLevel: "INFO"
  nats:
    url: "nats://localhost:4222"
    analysisSubmitSubject: "analysis.submit"
    jobFetchSubject: "job.fetch"
  historyServerUrl: "http://localhost:18080"
  historyServerTimeout: 30.0
  pollIntervalSeconds: 60
  batchSize: 50
  maxProcessedApps: 10000
  databaseUrl: "sqlite+aiosqlite:////data/hs_connector.db"
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    mountPath: /data

imagePullSecrets: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
