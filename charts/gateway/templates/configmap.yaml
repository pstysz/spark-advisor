apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
data:
  SA_GATEWAY_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  SA_GATEWAY_SERVER__HOST: {{ .Values.config.server.host | quote }}
  SA_GATEWAY_SERVER__PORT: {{ .Values.config.server.port | quote }}
  SA_GATEWAY_NATS__URL: {{ .Values.config.nats.url | quote }}
  SA_GATEWAY_NATS__JOB_FETCH_SUBJECT: {{ .Values.config.nats.jobFetchSubject | quote }}
  SA_GATEWAY_NATS__ANALYSIS_RUN_SUBJECT: {{ .Values.config.nats.analysisRunSubject | quote }}
  SA_GATEWAY_NATS__ANALYSIS_RUN_AGENT_SUBJECT: {{ .Values.config.nats.analysisRunAgentSubject | quote }}
  SA_GATEWAY_NATS__APPS_LIST_SUBJECT: {{ .Values.config.nats.appsListSubject | quote }}
  SA_GATEWAY_NATS__FETCH_TIMEOUT: {{ .Values.config.nats.fetchTimeout | quote }}
  SA_GATEWAY_NATS__ANALYZE_TIMEOUT: {{ .Values.config.nats.analyzeTimeout | quote }}
  SA_GATEWAY_NATS__ANALYZE_AGENT_TIMEOUT: {{ .Values.config.nats.analyzeAgentTimeout | quote }}
  SA_GATEWAY_NATS__LIST_APPS_TIMEOUT: {{ .Values.config.nats.listAppsTimeout | quote }}
  SA_GATEWAY_NATS__ANALYSIS_SUBMIT_SUBJECT: {{ .Values.config.nats.analysisSubmitSubject | quote }}
  SA_GATEWAY_NATS__POLLING_ANALYSIS_MODE: {{ .Values.config.nats.pollingAnalysisMode | quote }}
  SA_GATEWAY_DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
