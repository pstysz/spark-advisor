replicaCount: 1

image:
  repository: ghcr.io/pstysz/spark-advisor-gateway
  tag: ""
  pullPolicy: IfNotPresent

config:
  logLevel: "INFO"
  server:
    host: "0.0.0.0"
    port: 8080
  nats:
    url: "nats://localhost:4222"
    jobFetchSubject: "job.fetch"
    analysisRunSubject: "analysis.run"
    analysisRunAgentSubject: "analysis.run.agent"
    appsListSubject: "apps.list"
    analysisSubmitSubject: "analysis.submit"
    pollingAnalysisMode: "ai"
    fetchTimeout: 30.0
    analyzeTimeout: 120.0
    analyzeAgentTimeout: 300.0
    listAppsTimeout: 10.0
  databaseUrl: "sqlite+aiosqlite:////data/spark_advisor.db"
  wsHeartbeatInterval: 30
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    mountPath: /data

service:
  type: ClusterIP
  port: 8080
  nodePort: ""

imagePullSecrets: []

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: spark-advisor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
