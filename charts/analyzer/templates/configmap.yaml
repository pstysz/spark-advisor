apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "analyzer.fullname" . }}
  labels:
    {{- include "analyzer.labels" . | nindent 4 }}
data:
  SA_ANALYZER_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  SA_ANALYZER_NATS__URL: {{ .Values.config.nats.url | default (printf "nats://%s-nats:4222" .Release.Name) | quote }}
  SA_ANALYZER_NATS__REQUEST_SUBJECT: {{ .Values.config.nats.requestSubject | quote }}
  SA_ANALYZER_NATS__RESULT_SUBJECT: {{ .Values.config.nats.resultSubject | quote }}
  SA_ANALYZER_AI__ENABLED: {{ .Values.config.ai.enabled | quote }}
  SA_ANALYZER_AI__MODEL: {{ .Values.config.ai.model | quote }}
  SA_ANALYZER_AI__API_TIMEOUT: {{ .Values.config.ai.apiTimeout | quote }}
  SA_ANALYZER_AI__MAX_TOKENS: {{ .Values.config.ai.maxTokens | quote }}
  SA_ANALYZER_THRESHOLDS__SKEW_WARNING_RATIO: {{ .Values.config.thresholds.skewWarningRatio | quote }}
  SA_ANALYZER_THRESHOLDS__SKEW_CRITICAL_RATIO: {{ .Values.config.thresholds.skewCriticalRatio | quote }}
  SA_ANALYZER_THRESHOLDS__SPILL_WARNING_GB: {{ .Values.config.thresholds.spillWarningGb | quote }}
  SA_ANALYZER_THRESHOLDS__SPILL_CRITICAL_GB: {{ .Values.config.thresholds.spillCriticalGb | quote }}
  SA_ANALYZER_THRESHOLDS__GC_WARNING_PERCENT: {{ .Values.config.thresholds.gcWarningPercent | quote }}
  SA_ANALYZER_THRESHOLDS__GC_CRITICAL_PERCENT: {{ .Values.config.thresholds.gcCriticalPercent | quote }}
  SA_ANALYZER_THRESHOLDS__GC_TARGET_PERCENT: {{ .Values.config.thresholds.gcTargetPercent | quote }}
  SA_ANALYZER_THRESHOLDS__TARGET_PARTITION_SIZE_BYTES: {{ .Values.config.thresholds.targetPartitionSizeBytes | quote }}
  SA_ANALYZER_THRESHOLDS__PARTITION_RATIO_MIN: {{ .Values.config.thresholds.partitionRatioMin | quote }}
  SA_ANALYZER_THRESHOLDS__PARTITION_RATIO_MAX: {{ .Values.config.thresholds.partitionRatioMax | quote }}
  SA_ANALYZER_THRESHOLDS__MIN_SLOT_UTILIZATION_PERCENT: {{ .Values.config.thresholds.minSlotUtilizationPercent | quote }}
  SA_ANALYZER_THRESHOLDS__TASK_FAILURE_WARNING_COUNT: {{ .Values.config.thresholds.taskFailureWarningCount | quote }}
  SA_ANALYZER_THRESHOLDS__SCHEDULER_DELAY_MS: {{ .Values.config.thresholds.schedulerDelayMs | quote }}
  SA_ANALYZER_THRESHOLDS__SMALL_FILE_THRESHOLD_BYTES: {{ .Values.config.thresholds.smallFileThresholdBytes | quote }}
  SA_ANALYZER_THRESHOLDS__BROADCAST_JOIN_DEFAULT_BYTES: {{ .Values.config.thresholds.broadcastJoinDefaultBytes | quote }}
  SA_ANALYZER_THRESHOLDS__MEMORY_OVERHEAD_GC_THRESHOLD_PERCENT: {{ .Values.config.thresholds.memoryOverheadGcThresholdPercent | quote }}
  SA_ANALYZER_THRESHOLDS__MEMORY_OVERHEAD_MEM_UTILIZATION_PERCENT: {{ .Values.config.thresholds.memoryOverheadMemUtilizationPercent | quote }}
