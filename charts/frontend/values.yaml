replicaCount: 1

image:
  repository: ghcr.io/pstysz/spark-advisor-frontend
  tag: ""
  pullPolicy: IfNotPresent

config:
  gatewayUrl: "http://spark-advisor-gateway:8080"

service:
  type: ClusterIP
  port: 80
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: spark-advisor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}
