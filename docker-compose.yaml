services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  analyzer:
    build:
      context: .
      dockerfile: packages/spark-advisor-analyzer/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SA_ANALYZER_NATS__URL: "nats://nats:4222"
      SA_ANALYZER_AI__ENABLED: "true"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

  hs-connector:
    build:
      context: .
      dockerfile: packages/spark-advisor-hs-connector/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SA_CONNECTOR_NATS__URL: "nats://nats:4222"
      SA_CONNECTOR_POLLING_ENABLED: "${SA_CONNECTOR_POLLING_ENABLED:-false}"
      SA_CONNECTOR_HISTORY_SERVER_URL: "${SPARK_HISTORY_SERVER_URL:-http://host.docker.internal:18080}"
      SA_CONNECTOR_DATABASE_URL: "sqlite+aiosqlite:////data/hs_connector.db"
    volumes:
      - hs-connector-data:/data

  gateway:
    build:
      context: .
      dockerfile: packages/spark-advisor-gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SA_GATEWAY_NATS__URL: "nats://nats:4222"
      SA_GATEWAY_DATABASE_URL: "sqlite+aiosqlite:////data/spark_advisor.db"
    volumes:
      - gateway-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/live')"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: packages/spark-advisor-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./packages/spark-advisor-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  nats-data:
  gateway-data:
  hs-connector-data:
