services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  analyzer:
    build:
      context: .
      dockerfile: packages/spark-advisor-analyzer/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SA_ANALYZER_NATS__URL: "nats://nats:4222"
      SA_ANALYZER_AI__ENABLED: "true"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      SA_ANALYZER_OTEL__ENABLED: "${SA_OTEL_ENABLED:-false}"
      SA_ANALYZER_OTEL__ENDPOINT: "${SA_OTEL_ENDPOINT:-http://tempo:4317}"

  hs-connector:
    build:
      context: .
      dockerfile: packages/spark-advisor-hs-connector/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SA_HS_CONNECTOR_NATS__URL: "nats://nats:4222"
      SA_HS_CONNECTOR_POLLING_ENABLED: "${SA_HS_CONNECTOR_POLLING_ENABLED:-false}"
      SA_HS_CONNECTOR_HISTORY_SERVER_URL: "${SPARK_HISTORY_SERVER_URL:-http://host.docker.internal:18080}"
      SA_HS_CONNECTOR_DATABASE_URL: "sqlite+aiosqlite:////data/hs_connector.db"
      SA_HS_CONNECTOR_OTEL__ENABLED: "${SA_OTEL_ENABLED:-false}"
      SA_HS_CONNECTOR_OTEL__ENDPOINT: "${SA_OTEL_ENDPOINT:-http://tempo:4317}"
    volumes:
      - hs-connector-data:/data

  storage-connector:
    build:
      context: .
      dockerfile: packages/spark-advisor-storage-connector/Dockerfile
      args:
        CONNECTOR_TYPE: "${SA_STORAGE_CONNECTOR_TYPE:-hdfs}"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SA_STORAGE_NATS__URL: "nats://nats:4222"
      SA_STORAGE_CONNECTOR_TYPE: "${SA_STORAGE_CONNECTOR_TYPE:-hdfs}"
      SA_STORAGE_POLLING_ENABLED: "${SA_STORAGE_POLLING_ENABLED:-false}"
      SA_STORAGE_HDFS__NAMENODE_URL: "${SA_STORAGE_HDFS_NAMENODE_URL:-http://host.docker.internal:9870}"
      SA_STORAGE_DATABASE_URL: "sqlite+aiosqlite:////data/storage_${SA_STORAGE_CONNECTOR_TYPE:-hdfs}_connector.db"
      SA_STORAGE_OTEL__ENABLED: "${SA_OTEL_ENABLED:-false}"
      SA_STORAGE_OTEL__ENDPOINT: "${SA_OTEL_ENDPOINT:-http://tempo:4317}"
    volumes:
      - storage-connector-data:/data

  gateway:
    build:
      context: .
      dockerfile: packages/spark-advisor-gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      SA_GATEWAY_NATS__URL: "nats://nats:4222"
      SA_GATEWAY_DATABASE_URL: "sqlite+aiosqlite:////data/spark_advisor.db"
      SA_GATEWAY_OTEL__ENABLED: "${SA_OTEL_ENABLED:-false}"
      SA_GATEWAY_OTEL__ENDPOINT: "${SA_OTEL_ENDPOINT:-http://tempo:4317}"
    volumes:
      - gateway-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/live')"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: packages/spark-advisor-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./packages/spark-advisor-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  nats-data:
  gateway-data:
  hs-connector-data:
  storage-connector-data:
