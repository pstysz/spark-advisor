[project]
name = "spark-advisor"
version = "0.1.0"
description = "AI-powered Apache Spark job analyzer and configuration advisor"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
keywords = ["spark", "apache-spark", "performance", "optimization", "ai", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "typer>=0.15",
    "rich>=14",
    "httpx>=0.28",
    "pydantic>=2.10",
    "orjson>=3.10",
    "anthropic>=0.52",
    "mcp>=1.9",
]

[project.scripts]
spark-advisor = "spark_advisor.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spark_advisor"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=spark_advisor",
    "--cov-report=term-missing",
]
markers = [
    "integration: marks tests that require external services",
]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "TCH", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["spark_advisor"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.coverage.run]
source = ["spark_advisor"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.1",
    "pytest-asyncio>=1.0",
    "mypy>=1.15",
    "ruff>=0.11",
    "polyfactory>=2.21",
    "respx>=0.22",
]
