[project]
name = "spark-advisor-shared"
version = "0.1.0"
description = "Shared contracts and infrastructure for spark-advisor microservices"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings[yaml]>=2.0",
    "orjson>=3.10",
    "confluent-kafka>=2.6",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "opentelemetry-api>=1.29",
    "opentelemetry-sdk>=1.29",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.1",
    "mypy>=1.15",
    "ruff>=0.11",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spark_advisor_shared"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "TCH", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["spark_advisor_shared"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "confluent_kafka.*"
ignore_missing_imports = true
