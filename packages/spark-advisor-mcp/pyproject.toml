[project]
name = "spark-advisor-mcp"
version = "0.1.6" # x-release-please-version
description = "MCP server exposing spark-advisor tools for Claude Desktop and other MCP clients"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [
    { name = "Pawel Stysz" },
]
keywords = ["spark", "apache-spark", "mcp", "claude", "ai", "model-context-protocol"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "spark-advisor-models==0.1.6",  # x-release-please-version
    "spark-advisor-rules==0.1.6",  # x-release-please-version
    "spark-advisor-analyzer==0.1.6",  # x-release-please-version
    "spark-advisor-hs-connector==0.1.6",  # x-release-please-version
    "spark-advisor-cli==0.1.6",  # x-release-please-version
    "mcp>=1.26",
]

[project.urls]
Homepage = "https://github.com/pstysz/spark-advisor"
Repository = "https://github.com/pstysz/spark-advisor"
Issues = "https://github.com/pstysz/spark-advisor/issues"

[project.scripts]
spark-advisor-mcp = "spark_advisor_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spark_advisor_mcp"]

[tool.uv.sources]
spark-advisor-models = { workspace = true }
spark-advisor-rules = { workspace = true }
spark-advisor-analyzer = { workspace = true }
spark-advisor-hs-connector = { workspace = true }
spark-advisor-cli = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.1",
    "mypy>=1.15",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "TCH", "RUF"]

[tool.ruff.lint.isort]
known-first-party = [
    "spark_advisor_mcp",
    "spark_advisor_models",
    "spark_advisor_rules",
    "spark_advisor_analyzer",
    "spark_advisor_hs_connector",
    "spark_advisor_cli",
]

[tool.ruff.lint.flake8-type-checking]
runtime-evaluated-base-classes = ["pydantic.BaseModel", "pydantic_settings.BaseSettings"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.coverage.run]
source = ["spark_advisor_mcp"]
branch = true

[tool.coverage.report]
show_missing = true
