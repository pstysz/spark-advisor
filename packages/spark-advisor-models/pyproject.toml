[project]
name = "spark-advisor-models"
version = "0.1.11" # x-release-please-version
description = "Shared Pydantic contracts for spark-advisor microservices"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [
    { name = "Pawel Stysz" },
]
keywords = ["spark", "apache-spark", "pydantic", "models", "metrics"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings[yaml]>=2.0",
    "orjson>=3.10",
    "structlog>=24.0",
    "opentelemetry-api>=1.25.0",
    "opentelemetry-sdk>=1.25.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.25.0",
]

[project.urls]
Homepage = "https://github.com/pstysz/spark-advisor"
Repository = "https://github.com/pstysz/spark-advisor"
Issues = "https://github.com/pstysz/spark-advisor/issues"

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.1",
    "mypy>=1.15",
    "ruff>=0.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spark_advisor_models"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "TCH", "RUF"]

[tool.ruff.lint.flake8-type-checking]
runtime-evaluated-base-classes = ["pydantic.BaseModel", "pydantic_settings.BaseSettings"]

[tool.ruff.lint.isort]
known-first-party = ["spark_advisor_models"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
