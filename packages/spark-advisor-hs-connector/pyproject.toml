[project]
name = "spark-advisor-hs-connector"
version = "0.1.15" # x-release-please-version
description = "Spark History Server connector - polls and publishes jobs to NATS"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [
    { name = "Pawel Stysz" },
]
keywords = ["spark", "apache-spark", "history-server", "nats", "connector", "monitoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
    "Typing :: Typed",
]
dependencies = [
    "spark-advisor-models==0.1.15",  # x-release-please-version
    "httpx>=0.28",
    "faststream[nats]>=0.6",
    "sqlalchemy[asyncio]>=2.0",
    "aiosqlite>=0.20",
    "opentelemetry-instrumentation-httpx>=0.46b0",
]

[project.urls]
Homepage = "https://github.com/pstysz/spark-advisor"
Repository = "https://github.com/pstysz/spark-advisor"
Issues = "https://github.com/pstysz/spark-advisor/issues"

[project.scripts]
spark-advisor-hs-connector = "spark_advisor_hs_connector.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spark_advisor_hs_connector"]

[tool.uv.sources]
spark-advisor-models = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=1.0",
    "pytest-cov>=6.1",
    "respx>=0.22",
    "mypy>=1.15",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "TCH", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["spark_advisor_hs_connector", "spark_advisor_models"]

[tool.ruff.lint.flake8-type-checking]
runtime-evaluated-base-classes = ["pydantic.BaseModel", "pydantic_settings.BaseSettings"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.coverage.run]
source = ["spark_advisor_hs_connector"]
branch = true

[tool.coverage.report]
show_missing = true
