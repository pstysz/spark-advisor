name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint (ruff + mypy)
        run: make lint

      - name: Test
        run: make test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/spark-advisor-frontend/package-lock.json

      - name: Install dependencies
        run: cd packages/spark-advisor-frontend && npm ci

      - name: Type check
        run: cd packages/spark-advisor-frontend && npm run type-check

      - name: Lint
        run: cd packages/spark-advisor-frontend && npm run lint

      - name: Build
        run: cd packages/spark-advisor-frontend && npm run build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint subchart — analyzer
        run: helm lint charts/analyzer

      - name: Lint subchart — gateway
        run: helm lint charts/gateway

      - name: Lint subchart — frontend
        run: helm lint charts/frontend

      - name: Lint subchart — hs-connector
        run: helm lint charts/hs-connector

      - name: Lint subchart — storage-connector
        run: helm lint charts/storage-connector

      - name: Lint subchart — prometheus
        run: helm lint charts/prometheus

      - name: Lint subchart — grafana
        run: helm lint charts/grafana

      - name: Lint subchart — tempo
        run: helm lint charts/tempo

      - name: Add NATS Helm repository
        run: helm repo add nats https://nats-io.github.io/k8s/helm/charts/

      - name: Build umbrella chart dependencies
        run: helm dependency update charts/spark-advisor

      - name: Lint umbrella chart
        run: helm lint charts/spark-advisor

      - name: Verify template rendering
        run: helm template test charts/spark-advisor
